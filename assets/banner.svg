<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05010f"/>
      <stop offset="45%" stop-color="#150a2e"/>
      <stop offset="72%" stop-color="#2a1030"/>
      <stop offset="100%" stop-color="#160a08"/>
    </linearGradient>

    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff3c4"/>
      <stop offset="35%" stop-color="#ffb347"/>
      <stop offset="70%" stop-color="#ff6a3d"/>
      <stop offset="100%" stop-color="#ff6a3d" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="dune1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a2e17"/>
      <stop offset="100%" stop-color="#2c1408"/>
    </linearGradient>
    <linearGradient id="dune2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a4a1f"/>
      <stop offset="100%" stop-color="#4a220e"/>
    </linearGradient>

    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowMag" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="url(#sky)"/>

  <!-- stars -->
  <g fill="#c9e7ff">
    <circle cx="90" cy="40" r="1.3"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="220" cy="70" r="1" ><animate attributeName="opacity" values="1;0.2;1" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="340" cy="30" r="1.2"><animate attributeName="opacity" values="0.3;1;0.3" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="520" cy="55" r="1" ><animate attributeName="opacity" values="1;0.3;1" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="25" r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="920" cy="60" r="1" ><animate attributeName="opacity" values="1;0.2;1" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="1080" cy="35" r="1.3"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="1150" cy="80" r="1" ><animate attributeName="opacity" values="1;0.3;1" dur="2.7s" repeatCount="indefinite"/></circle>
  </g>

  <!-- twin suns / moons, Dune style -->
  <circle cx="600" cy="120" r="46" fill="url(#sun)">
    <animate attributeName="r" values="44;50;44" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="120" r="22" fill="#fff8e6" opacity="0.9"/>

  <!-- cyberpunk perspective grid floor -->
  <g stroke="#00eaff" stroke-width="1.4" opacity="0.55" filter="url(#glowCyan)">
    <line x1="600" y1="150" x2="60" y2="300"/>
    <line x1="600" y1="150" x2="230" y2="310"/>
    <line x1="600" y1="150" x2="420" y2="318"/>
    <line x1="600" y1="150" x2="600" y2="320"/>
    <line x1="600" y1="150" x2="780" y2="318"/>
    <line x1="600" y1="150" x2="970" y2="310"/>
    <line x1="600" y1="150" x2="1140" y2="300"/>
  </g>
  <g stroke="#ff2ed1" stroke-width="1" opacity="0.45" filter="url(#glowMag)">
    <path d="M120 300 Q600 260 1080 300" fill="none"/>
    <path d="M180 275 Q600 240 1020 275" fill="none"/>
    <path d="M260 255 Q600 225 940 255" fill="none"/>
    <path d="M360 235 Q600 212 840 235" fill="none"/>
    <animateTransform attributeName="transform" type="translate" values="0 0;0 6;0 0" dur="2.4s" repeatCount="indefinite"/>
  </g>

  <!-- dune silhouettes -->
  <path d="M0 260 Q150 220 320 250 T650 245 T1000 260 T1200 240 V320 H0 Z" fill="url(#dune1)"/>
  <path d="M0 290 Q220 250 480 280 T900 275 T1200 290 V320 H0 Z" fill="url(#dune2)"/>

  <!-- title -->
  <text x="600" y="105" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="44" font-weight="700" fill="#7dfcff" filter="url(#glowCyan)">
    VIDHAN MANIHAR
    <animate attributeName="opacity" values="1;0.85;1;0.7;1" dur="3.6s" repeatCount="indefinite"/>
  </text>

  <text x="600" y="140" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="17" letter-spacing="3" fill="#ffcf8b" opacity="0.9">
    BACKEND ENGINEER  ·  AGENTIC AI ARCHITECT  ·  THE SPICE MUST FLOW
  </text>
</svg>
